name: hr_app
description: "HR System Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.8

  # Navigation
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  open_file: ^3.5.10
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true